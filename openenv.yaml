name: supply-chain-disruption-agent
description: >
  Deterministic supply chain disruption simulator with a heuristic baseline,
  optional LLM policy, and a FastAPI server wrapper for demos and integrations.
version: "2.1.0"
entrypoint: envs.supply_chain_env.server.environment:SupplyChainEnvironment

metadata:
  api_app: envs.supply_chain_env.server.app:app
  default_task: hard

tasks:
  - name: easy
    description: Single supplier delay with two urgent warehouse-A orders.
    max_steps: 10
  - name: medium
    description: Multi-warehouse inventory imbalance requiring reallocation.
    max_steps: 15
  - name: hard
    description: Cascading disruptions requiring expedite, reroute, and recovery.
    max_steps: 20

action_schema:
  type: object
  properties:
    action_type:
      type: string
      enum: [reroute, expedite, reallocate, wait]
    route_id:
      type: string
      nullable: true
    supplier_id:
      type: string
      nullable: true
    warehouse_id:
      type: string
      nullable: true
    quantity:
      type: integer
      nullable: true
  required: [action_type]

observation_schema:
  type: object
  properties:
    inventory_levels:
      type: object
    pending_orders:
      type: array
    disruption_status:
      type: array
    cost_so_far:
      type: number
    time_step:
      type: integer
    task_name:
      type: string
    max_steps:
      type: integer
    orders_fulfilled:
      type: integer
    orders_missed:
      type: integer
    total_orders:
      type: integer
    supplier_info:
      type: object
    route_info:
      type: object
    done:
      type: boolean
    reward:
      type: number

tags:
  - openenv
  - real-world
  - logistics
  - simulation
  - hackathon
  - fastapi
