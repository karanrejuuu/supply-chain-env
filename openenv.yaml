name: supply-chain-disruption-agent
description: >
  Deterministic supply chain disruption simulator with a heuristic baseline,
  optional LLM policy, and a FastAPI server wrapper for demos and integrations.
version: "2.1.0"
entrypoint: envs.supply_chain_env.server.environment:SupplyChainEnvironment

metadata:
  api_app: envs.supply_chain_env.server.app:app
  default_task: hard

tasks:
  - name: easy
    description: Single supplier delay with two urgent warehouse-A orders.
    max_steps: 10
  - name: medium
    description: Multi-warehouse inventory imbalance requiring reallocation.
    max_steps: 15
  - name: hard
    description: Cascading disruptions requiring expedite, reroute, and recovery.
    max_steps: 20

